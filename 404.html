<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Teja Nutakki</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }

        .glitch-code {
            font-size: 8rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #06ffa5);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            position: relative;
            line-height: 1;
            margin-bottom: 20px;
        }

        .glitch-code::before,
        .glitch-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            -webkit-text-fill-color: transparent;
            background: inherit;
            background-size: inherit;
            -webkit-background-clip: text;
            background-clip: text;
            animation: glitch 2s infinite;
        }

        .glitch-code::before {
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation-delay: -0.5s;
        }

        .glitch-code::after {
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            animation-delay: -1s;
        }

        @keyframes glitch {

            0%,
            100% {
                transform: translateX(-50%);
            }

            20% {
                transform: translateX(calc(-50% + 3px));
            }

            40% {
                transform: translateX(calc(-50% - 3px));
            }

            60% {
                transform: translateX(calc(-50% + 1px));
            }

            80% {
                transform: translateX(calc(-50% - 1px));
            }
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        .error-message {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .error-terminal {
            background: rgba(15, 20, 37, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.9;
        }

        .error-terminal .prompt {
            color: #06ffa5;
        }

        .error-terminal .path {
            color: #00d4ff;
        }

        .error-terminal .warn {
            color: #ffbd2e;
        }

        .error-terminal .err {
            color: #ff5f57;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.3);
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="error-container">
        <div class="glitch-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">Looks like this route doesn't exist. Even my Spring Boot controller couldn't handle
            this one.</p>

        <div class="error-terminal">
            <div><span class="prompt">teja@portfolio</span> <span class="path">~</span> $ curl this-page</div>
            <div><span class="err">Error 404:</span> The requested resource was not found.</div>
            <div><span class="warn">Suggestion:</span> Try navigating to the homepage instead.</div>
            <div><span class="prompt">teja@portfolio</span> <span class="path">~</span> $ <span class="blink">_</span>
            </div>
        </div>

        <a href="/" class="home-btn">
            <i class="fas fa-home"></i>
            <span>Back to Home</span>
        </a>
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 8 + 5) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
            container.appendChild(p);
        }
    </script>
</body>

</html>
